services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  dnd-opencode:
    build:
      context: ./dnd
      dockerfile: Dockerfile
    command: bun run opencode
    ports:
      - "4096:4096"
    restart: always

  dnd-api:
    build:
      context: ./dnd
      dockerfile: Dockerfile
    command: bun start
    ports:
      - "3000:3000"
    environment:
      - OPENCODE_URL=http://dnd-opencode:4096
      - AUTH_SECRET=your_secret_here
      - DB_PATH=/data/users.db
    volumes:
      - dnd_data:/data
    depends_on:
      - dnd-opencode
    restart: always

  game-api:
    build:
      context: .
      dockerfile: Dockerfile.game-api
    ports:
      - "3001:3001"
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: always

  sixsevenstory:
    build:
      context: ./SixSevenStory
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - shared_data:/app/public
    restart: always

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    environment:
      - TOKEN=${TOKEN}
      - DND_API_URL=http://dnd-api:3000
      - GAME_API_URL=http://game-api:3001
      - WEB_DATA_PATH=/app/data
    volumes:
      - shared_data:/app/data
    depends_on:
      - dnd-api
      - game-api
    restart: always

volumes:
  redis_data:
  shared_data:
  dnd_data:
